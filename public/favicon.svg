<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Warm paper cream background -->
  <rect width="32" height="32" fill="#f3ece0"/>
  <!-- Vermillion stamp border -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#c4291a" stroke-width="1.5"/>
  <!-- Korean character 기 (gi) as geometric paths, vermillion fill -->
  <!-- Top horizontal stroke -->
  <rect x="8" y="8" width="16" height="2.5" fill="#c4291a"/>
  <!-- Left vertical stroke -->
  <rect x="8" y="8" width="2.5" height="16" fill="#c4291a"/>
  <!-- Bottom horizontal stroke -->
  <rect x="8" y="21.5" width="16" height="2.5" fill="#c4291a"/>
</svg>
